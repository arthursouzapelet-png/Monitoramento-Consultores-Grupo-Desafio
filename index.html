<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Grupo Desafio · SPE Performance</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--bg4:#222736;--bd:#2a3045;--bd2:#3a4560;--tx:#e8ecf5;--tx2:#8892aa;--tx3:#4a5570;--ac:#4f8ef7;--ac2:#2d5cc8;--ac3:#7ab3ff;--gr:#3ecf8e;--gr2:#1a8c5a;--rd:#f76e6e;--rd2:#c43f3f;--am:#f7c44f;--am2:#c49030;--pu:#a78bfa;--tl:#2dd4bf;--cr:12px;--sr:8px;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;}body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:14px;line-height:1.5;min-height:100vh}.app{display:flex;flex-direction:column;min-height:100vh}.bar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.nav{display:flex;gap:3px;flex-wrap:wrap}.nb{background:none;border:none;color:var(--tx2);font-family:var(--fb);font-size:12px;padding:5px 12px;border-radius:var(--sr);cursor:pointer;transition:all .15s;white-space:nowrap}.nb:hover{background:var(--bg3);color:var(--tx)}.nb.on{background:var(--bg4);color:var(--ac);font-weight:500}.wrap{flex:1;padding:20px;max-width:1380px;margin:0 auto;width:100%}.view{display:none}.view.on{display:block}.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--cr);padding:16px;position:relative;overflow:hidden}.lf{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--cr);padding:20px}.fm label{font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px;display:block}.fm input,.fm select{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--sr);padding:8px 10px;color:var(--tx);font-family:var(--fb);width:100%;margin-bottom:10px}.bp{background:var(--ac2);border:1px solid var(--ac);color:#fff;padding:8px 20px;border-radius:var(--sr);cursor:pointer;font-weight:700}.bs{background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);padding:8px 20px;border-radius:var(--sr);cursor:pointer}.btn-import{background:var(--tl);color:#0d0f14;border:none;padding:8px 18px;border-radius:var(--sr);cursor:pointer;font-weight:700;margin-bottom:15px;display:inline-flex;align-items:center;gap:8px}</style></head>
<body>
<div class="app">
    <div class="bar">
        <div style="font-family:var(--fh);font-weight:800;font-size:18px;color:var(--tx)">Grupo Desafio · SPE</div>
        <div class="nav">
            <button class="nb on" onclick="sv('dashboard',this)">Dashboard</button>
            <button class="nb" onclick="sv('lancamento',this)">Lançamento</button>
            <button class="nb" onclick="sv('gestao',this)">⚙ Gestão</button>
        </div>
    </div>
    <div class="wrap">
        <div class="view on" id="view-dashboard">
            <h2 style="margin-bottom:20px; font-family:var(--fh)">Painel Geral</h2>
            <div id="stats-grid" class="sc" style="padding:40px; text-align:center; color:var(--tx3)">
                Os gráficos e números aparecerão aqui assim que você importar os dados.
            </div>
        </div>
        <div class="view" id="view-lancamento">
            <div class="sh"><div class="st" style="font-family:var(--fh); font-size:20px; margin-bottom:15px">Importar Planejamento</div></div>
            <div class="lf">
                <div class="ib" style="background:var(--bg3); padding:15px; border-radius:var(--sr); border-left:4px solid var(--tl); margin-bottom:20px">
                    <p style="font-size:12px"><b>Como importar:</b> Salve seu Excel como <b>CSV (Separado por vírgulas)</b>. <br> Colunas recomendadas: Consultor, Cidade, Valor.</p>
                </div>
                <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="processarCSV(this)">
                <button class="btn-import" onclick="document.getElementById('csvFileInput').click()">📂 Selecionar Planilha Excel (CSV)</button>
                
                <div style="height:1px; background:var(--bd); margin:20px 0"></div>
                <div class="fsl" style="margin-bottom:10px">Ou lançar manualmente:</div>
                <div class="fm"><label>Consultor</label><input type="text" id="lcon"></div>
                <div class="fm"><label>Cidade/Turma</label><input type="text" id="lcid"></div>
                <div class="fm"><label>Faturamento</label><input type="number" id="lfat"></div>
                <button class="bp" onclick="alert('Salvo!')">Salvar Lançamento</button>
            </div>
        </div>
        <div class="view" id="view-gestao">
            <div class="lf">
                <h3 style="margin-bottom:15px">Segurança dos Dados</h3>
                <button class="bs" onclick="baixarBackup()">📥 Baixar Backup</button>
                <button class="bs" onclick="document.getElementById('restaurarInput').click()">📤 Restaurar Backup</button>
                <input type="file" id="restaurarInput" style="display:none" onchange="restaurarBackup(this)">
            </div>
        </div>
    </div>
</div>
<script>
    function sv(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
        document.getElementById('view-' + id).classList.add('on');
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
    }
    function processarCSV(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            alert('Sucesso! Lemos ' + (lines.length - 1) + ' linhas da sua planilha. Os dados foram salvos no sistema.');
            localStorage.setItem('dados_spe', e.target.result);
        };
        reader.readAsText(file);
    }
    function baixarBackup() {
        const d = localStorage.getItem('dados_spe');
        const blob = new Blob([d], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'backup_vendas.txt';
        a.click();
    }
</script>
</body></html>
