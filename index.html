<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Desafio · SPE Performance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        /* MANTIVE SEU ESTILO ORIGINAL E ADICIONEI O BOTÃO NOVO */
        :root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--bg4:#222736;--bd:#2a3045;--bd2:#3a4560;--tx:#e8ecf5;--tx2:#8892aa;--tx3:#4a5570;--ac:#4f8ef7;--ac2:#2d5cc8;--ac3:#7ab3ff;--gr:#3ecf8e;--gr2:#1a8c5a;--rd:#f76e6e;--rd2:#c43f3f;--am:#f7c44f;--am2:#c49030;--pu:#a78bfa;--tl:#2dd4bf;--cr:12px;--sr:8px;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:14px;line-height:1.5;min-height:100vh}
        .app{display:flex;flex-direction:column;min-height:100vh}
        .bar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .nav{display:flex;gap:3px;flex-wrap:wrap}
        .nb{background:none;border:none;color:var(--tx2);font-family:var(--fb);font-size:12px;padding:5px 12px;border-radius:var(--sr);cursor:pointer;transition:all .15s;white-space:nowrap}
        .nb.on{background:var(--bg4);color:var(--ac);font-weight:500}
        .wrap{flex:1;padding:20px;max-width:1380px;margin:0 auto;width:100%}
        .view{display:none}.view.on{display:block}
        .sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--cr);padding:16px;position:relative;overflow:hidden}
        .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac)}
        .lf{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--cr);padding:20px}
        .fm label{font-size:10px;color:var(--tx3);text-transform:uppercase;display:block;margin-bottom:4px}
        .fm input, .fm select{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--sr);padding:8px 10px;color:var(--tx);width:100%;margin-bottom:10px}
        .bp{background:var(--ac2);border:1px solid var(--ac);color:#fff;padding:8px 20px;border-radius:var(--sr);cursor:pointer;font-weight:bold}
        .bs{background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);padding:8px 20px;border-radius:var(--sr);cursor:pointer}
        /* Botão de Importar Planilha */
        .btn-import{background:var(--gr2);border:1px solid var(--gr);color:#fff;padding:8px 20px;border-radius:var(--sr);cursor:pointer;font-weight:bold;margin-left:10px}
    </style>
</head>
<body>
    <div class="app">
        <div class="bar">
            <div style="font-family:var(--fh);font-weight:800;color:var(--ac)">GRUPO DESAFIO SPE</div>
            <div class="nav">
                <button class="nb on" onclick="sv('dashboard')">Dashboard</button>
                <button class="nb" onclick="sv('lancamento')">Lançamento</button>
                <button class="nb" onclick="sv('gestao')">⚙ Gestão</button>
            </div>
        </div>

        <div class="wrap">
            <div class="view on" id="view-lancamento">
                <div class="sh"><div class="st">Lançar ou Importar Dados</div></div>
                <div class="lf">
                    <div class="fm">
                        <label>Importar do Excel (Salvar Excel como CSV antes)</label>
                        <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importarCSV(this)">
                        <button class="btn-import" onclick="document.getElementById('csvFile').click()">📂 Selecionar Planilha CSV</button>
                        <span style="font-size: 11px; color: var(--tx3); margin-left: 10px;">(Colunas: Consultor, Mes, Cidade, Empresas, Faturamento)</span>
                    </div>
                    <hr style="border:0; border-top:1px solid var(--bd); margin: 20px 0;">
                    <div class="fsl">Lançamento Manual</div>
                    <div class="fm"><label>Consultor</label><input type="text" id="lcon" placeholder="Nome do consultor"></div>
                    <div class="fm"><label>Cidade</label><input type="text" id="lcid" placeholder="Ex: Uberaba"></div>
                    <div class="fm"><label>Faturamento (R$)</label><input type="number" id="lfat" placeholder="0.00"></div>
                    <button class="bp" onclick="lancarManual()">Salvar Manual</button>
                </div>
            </div>
            
            <div class="view" id="view-gestao">
                <div class="lf">
                    <button class="bs" onclick="baixarBackup()">📥 Baixar Backup de Segurança</button>
                    <p style="font-size:11px; color:var(--tx3); margin-top:10px">Sempre baixe o backup após grandes alterações para não perder dados.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA DE NAVEGAÇÃO
        function sv(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
            document.getElementById('view-' + id).classList.add('on');
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
            event.target.classList.add('on');
        }

        // LÓGICA DE IMPORTAÇÃO DE CSV (O SEU JEITO FÁCIL)
        function importarCSV(input) {
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const text = e.target.result;
                const linhas = text.split('\n');
                let cadastros = JSON.parse(localStorage.getItem('spe_dados') || '[]');

                // Pula a primeira linha (cabeçalho)
                for (let i = 1; i < linhas.length; i++) {
                    const colunas = linhas[i].split(',');
                    if (colunas.length >= 4) {
                        const novoLancamento = {
                            consultor: colunas[0].trim(),
                            mes: colunas[1].trim(),
                            cidade: colunas[2].trim(),
                            empresas: colunas[3].trim(),
                            faturamento: colunas[4].trim(),
                            data: new Date().toLocaleDateString()
                        };
                        cadastros.push(novoLancamento);
                    }
                }
                
                localStorage.setItem('spe_dados', JSON.stringify(cadastros));
                alert('Sucesso! ' + (linhas.length - 1) + ' linhas importadas da planilha.');
            };
            reader.readAsText(file);
        }

        function lancarManual() {
            let cadastros = JSON.parse(localStorage.getItem('spe_dados') || '[]');
            const dado = {
                consultor: document.getElementById('lcon').value,
                cidade: document.getElementById('lcid').value,
                faturamento: document.getElementById('lfat').value,
                data: new Date().toLocaleDateString()
            };
            cadastros.push(dado);
            localStorage.setItem('spe_dados', JSON.stringify(cadastros));
            alert('Salvo com sucesso!');
        }

        function baixarBackup() {
            const dados = localStorage.getItem('spe_dados');
            const blob = new Blob([dados], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_spe_performance.json';
            a.click();
        }
    </script>
</body>
</html>
